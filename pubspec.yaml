name: video_downloader
description: YouTube Video Downloader
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  youtube_explode_dart: ^3.0.5
  permission_handler: ^11.0.0
  path_provider: ^2.1.0
  dio: ^5.3.0
  file_picker: ^10.3.10
  audioplayers: ^6.6.0
  video_player: ^2.11.1
  chewie: ^1.13.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  shelf: ^1.4.2
  network_info_plus: ^7.0.0
  just_audio: ^0.10.5
  audio_service: ^0.18.15
  shared_preferences: ^2.5.4
  speech_to_text: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logo2.png

dependency_overrides:
  sqflite: ">=2.3.0 <2.4.0"

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"